# ── Alertmanager (routes Loki-ruler alerts to Nova) ───────────────────────────
# Receives alerts from the Loki ruler and webhooks them to the Nova dashboard's
# /api/alerts route, which opens (idempotently) an incident. group_wait: 0s keeps
# the log-driven path fast; send_resolved is off because recovery is driven by the
# remediate/runbook flow, not by log volume dropping.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: nova-monitoring
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: nova
      group_by: ['service']
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1h
    receivers:
      - name: nova
        webhook_configs:
          - url: http://dashboard:3000/api/alerts
            send_resolved: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: nova-monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "48Mi"
            limits:
              memory: "96Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: nova-monitoring
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
