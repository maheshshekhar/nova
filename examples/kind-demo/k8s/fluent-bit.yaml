# в”Ђв”Ђ Fluent Bit (log shipper) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Node-level DaemonSet that tails every container's stdout/stderr, enriches it
# with Kubernetes metadata, keeps the `production`, `db-postgres` and
# `nova-monitoring` namespaces, and pushes the lines to Loki with labels
# {namespace, app}. Because it discovers logs from node log files (not the API),
# it automatically picks up those pods whenever they are (re)deployed вЂ” so the
# "delete production в†’ redeploy live" flow needs no Fluent Bit changes.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: nova-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: nova-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: nova-monitoring
  labels:
    app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush            1
        Daemon           Off
        Log_Level        info
        Parsers_File     parsers.conf
        HTTP_Server      Off

    [INPUT]
        Name             tail
        Tag              kube.*
        Path             /var/log/containers/*.log
        Parser           cri
        DB               /var/log/flb_kube.db
        Mem_Buf_Limit    10MB
        Skip_Long_Lines  On
        Refresh_Interval 5

    [FILTER]
        Name             kubernetes
        Match            kube.*
        Kube_Tag_Prefix  kube.var.log.containers.
        Merge_Log        Off
        Keep_Log         On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # Keep the application workloads (production), the database (db-postgres) and
    # the observability stack (nova-monitoring) namespaces.
    [FILTER]
        Name             grep
        Match            kube.*
        Regex            $kubernetes['namespace_name'] ^(production|db-postgres|nova-monitoring)$

    [OUTPUT]
        Name             loki
        Match            kube.*
        Host             loki
        Port             3100
        Labels           job=fluent-bit, namespace=$kubernetes['namespace_name'], app=$kubernetes['labels']['app'], pod=$kubernetes['pod_name']
        Remove_Keys      kubernetes,stream,logtag,_p
        Line_Format      json
        Auto_Kubernetes_Labels off

  parsers.conf: |
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: nova-monitoring
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      # Run on every node, including the tainted control-plane node in KinD.
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2020
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              memory: "128Mi"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibcontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibcontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: fluent-bit-config
