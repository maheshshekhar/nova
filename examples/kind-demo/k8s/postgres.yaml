apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: db-postgres
data:
  POSTGRES_DB: paymentdb
  POSTGRES_USER: payment_svc
  POSTGRES_PASSWORD: nova_password
  # Critically low connection limit — causes exhaustion under load
  POSTGRES_MAX_CONNECTIONS: "5"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: db-postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_PASSWORD
          command:
            - docker-entrypoint.sh
            - postgres
            - -c
            - max_connections=5
            - -c
            - log_connections=on
            - -c
            - log_disconnections=on
            - -c
            - log_min_duration_statement=100
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payment_svc", "-d", "paymentdb"]
            initialDelaySeconds: 5
            periodSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: db-postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
