apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: nova/payment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres.db-postgres"
            - name: DB_NAME
              value: "paymentdb"
            - name: DB_USER
              value: "payment_svc"
            - name: DB_PASSWORD
              value: "nova_password"
            - name: CONFIG_SERVICE_URL
              value: "http://config-service"
            - name: TRANSACTION_SERVICE_URL
              value: "http://transaction-service"
            - name: SERVICE_NAME
              value: "payment-service"
            - name: MEMORY_LIMIT_MB
              value: "128"
            - name: CPU_LIMIT_M
              value: "200"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 6
            periodSeconds: 2
            failureThreshold: 2
            timeoutSeconds: 2

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
    monitored: "true"
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
