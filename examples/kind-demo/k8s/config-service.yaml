apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: production
  labels:
    app: config-service
spec:
  replicas: 2
  strategy:
    # Recreate so an injected bad config takes ALL pods down at once (clearly
    # "critical" on the dashboard) instead of leaving old healthy pods up.
    type: Recreate
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: nova/config-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: FEATURE_FLAGS_URL
              value: "http://config-service/flags"
            - name: SERVICE_NAME
              value: "config-service"
            - name: MEMORY_LIMIT_MB
              value: "96"
            - name: CPU_LIMIT_M
              value: "100"
          resources:
            requests:
              memory: "48Mi"
              cpu: "25m"
            limits:
              memory: "96Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: production
  labels:
    app: config-service
    monitored: "true"
spec:
  selector:
    app: config-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
