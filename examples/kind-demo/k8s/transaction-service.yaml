apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: production
  labels:
    app: transaction-service
spec:
  replicas: 2
  strategy:
    # Recreate so a failure/restart cycles all pods together (clean down → up).
    type: Recreate
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: nova/transaction-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres.db-postgres"
            - name: DB_NAME
              value: "paymentdb"
            - name: DB_USER
              value: "payment_svc"
            - name: DB_PASSWORD
              value: "nova_password"
            # Upstream whose health this service's readiness mirrors (Nova demo
            # cascade). transaction-service goes NotReady when payment-service is in
            # incident and auto-recovers when it's healthy again.
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service"
            - name: SERVICE_NAME
              value: "transaction-service"
            - name: MEMORY_LIMIT_MB
              value: "96"
            - name: CPU_LIMIT_M
              value: "100"
          resources:
            requests:
              memory: "48Mi"
              cpu: "25m"
            limits:
              memory: "96Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: production
  labels:
    app: transaction-service
    monitored: "true"
spec:
  selector:
    app: transaction-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
