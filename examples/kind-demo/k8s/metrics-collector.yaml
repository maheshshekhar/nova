---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-collector
  namespace: nova-monitoring

---
# Cluster-wide read access so the collector can gather pod metrics from
# every namespace (nova-monitoring, production, and system namespaces) and list
# the full namespace inventory for the AI assistant.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-collector
subjects:
  - kind: ServiceAccount
    name: metrics-collector
    namespace: nova-monitoring
roleRef:
  kind: ClusterRole
  name: metrics-collector
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-collector
  namespace: nova-monitoring
  labels:
    app: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-collector
  template:
    metadata:
      labels:
        app: metrics-collector
    spec:
      serviceAccountName: metrics-collector
      containers:
        - name: metrics-collector
          image: nova/metrics-collector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-collector
  namespace: nova-monitoring
spec:
  selector:
    app: metrics-collector
  ports:
    - port: 3001
      targetPort: 3001
